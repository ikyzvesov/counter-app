<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Orders</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: #050510;
    color: white;
}

/* Табы */
.tabs {
    display: flex;
}

.tab {
    flex: 1;
    padding: 15px;
    text-align: center;
    background: #0d0d1a;
    cursor: pointer;
}

.tab.active {
    background: #00ffcc;
    color: black;
}

/* Экраны */
.screen {
    display: none;
    padding: 20px;
}

.screen.active {
    display: block;
}

/* СЧЕТЧИК */
.counter {
    font-size: 90px;
    text-align: center;
    margin: 20px 0;
    text-shadow: 0 0 20px #00ffcc;
}

/* КНОПКИ */
.controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.row {
    display: flex;
    gap: 15px;
}

button {
    border: none;
    cursor: pointer;
    color: white;
    font-size: 30px;
    border-radius: 12px;
    appearance: none;
}

/* + и - квадратные */
.square {
    width: 100px;
    height: 100px;
}

/* НЕОН */
.plus {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 20px #00ffcc;
}

.minus {
    background: #ff9800;
    box-shadow: 0 0 20px #ff9800;
}

.reset {
    width: 200px;
    height: 60px;
    background: #ff3b3b;
    box-shadow: 0 0 20px #ff3b3b;
}

/* Нажатие */
button:active {
    transform: scale(0.9);
    opacity: 0.8;
}

/* ВРЕМЯ */
.time {
    font-size: 50px;
    text-align: center;
    margin-top: 25px;
    color: #00ffcc;
    text-shadow: 0 0 20px #00ffcc;
}

/* ДЕНЬГИ */
.money-total {
    font-size: 40px;
    text-align: center;
    margin: 20px 0;
    text-shadow: 0 0 15px #00ffcc;
}

input {
    width: 100%;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
}

/* СТАТА */
.stat {
    background: rgba(0,255,204,0.1);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
}
</style>
</head>

<body>

<div class="tabs">
    <div class="tab active" onclick="openTab('main')">📦</div>
    <div class="tab" onclick="openTab('money')">💰</div>
    <div class="tab" onclick="openTab('stats')">📊</div>
</div>

<!-- ЗАКАЗЫ -->
<div id="main" class="screen active">

    <div class="counter" id="counter">0</div>

    <div class="controls">
        <div class="row">
            <button class="square plus" onclick="add()">+</button>
            <button class="square minus" onclick="minus()">−</button>
        </div>

        <button class="reset" onclick="reset()">Сброс</button>
    </div>

    <div class="time" id="time">00:00:00.000</div>

</div>

<!-- ДЕНЬГИ -->
<div id="money" class="screen">

    <div class="money-total" id="moneyTotal">0 ₴</div>

    <input type="number" id="moneyInput" placeholder="Сумма">
    <button class="plus" onclick="addMoney()">Добавить</button>
    <button class="reset" onclick="resetMoney()">Сброс</button>

</div>

<!-- СТАТИСТИКА -->
<div id="stats" class="screen">
    <div id="statsList"></div>
</div>

<script>
let count = Number(localStorage.getItem("count")) || 0;
let money = Number(localStorage.getItem("money")) || 0;
let stats = JSON.parse(localStorage.getItem("stats")) || {};

updateUI();

/* Табы */
function openTab(tab) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

    document.getElementById(tab).classList.add("active");
    event.target.classList.add("active");

    if(tab === "stats") renderStats();
}

/* Дата */
function today() {
    return new Date().toLocaleDateString();
}

/* Счетчик */
function add() {
    count++;
    updateStatsOrder();
    save();
}

function minus() {
    if(count > 0) count--;
    save();
}

function reset() {
    if(confirm("Сбросить?")) {
        count = 0;
        save();
    }
}

/* Деньги */
function addMoney() {
    let val = Number(document.getElementById("moneyInput").value);
    if(!val) return;

    money += val;
    updateStatsMoney(val);
    document.getElementById("moneyInput").value = "";
    save();
}

function resetMoney() {
    if(confirm("Сброс денег?")) {
        money = 0;
        save();
    }
}

/* Статистика */
function updateStatsOrder() {
    let d = today();
    if(!stats[d]) stats[d] = {orders:0, money:0};
    stats[d].orders++;
}

function updateStatsMoney(val) {
    let d = today();
    if(!stats[d]) stats[d] = {orders:0, money:0};
    stats[d].money += val;
}

function renderStats() {
    let el = document.getElementById("statsList");
    el.innerHTML = "";

    Object.keys(stats).reverse().forEach(date => {
        let s = stats[date];

        let div = document.createElement("div");
        div.className = "stat";
        div.innerText = `${date} — 📦 ${s.orders} | 💰 ${s.money} ₴`;

        el.appendChild(div);
    });
}

/* Сохранение */
function save() {
    localStorage.setItem("count", count);
    localStorage.setItem("money", money);
    localStorage.setItem("stats", JSON.stringify(stats));
    updateUI();
}

function updateUI() {
    document.getElementById("counter").innerText = count;
    document.getElementById("moneyTotal").innerText = money + " ₴";
}

/* ВРЕМЯ */
function updateTime() {
    const now = new Date();

    let h = String(now.getHours()).padStart(2, '0');
    let m = String(now.getMinutes()).padStart(2, '0');
    let s = String(now.getSeconds()).padStart(2, '0');
    let ms = String(now.getMilliseconds()).padStart(3, '0');

    document.getElementById("time").innerText =
        `${h}:${m}:${s}.${ms}`;
}

setInterval(updateTime, 10);
</script>

</body>
</html>
