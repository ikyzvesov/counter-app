<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders Tracker</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #1e1e2f, #2c2c54);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .app {
        width: 100%;
        max-width: 350px;
        padding: 20px;
        border-radius: 20px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
        font-size: 18px;
        opacity: 0.7;
        margin-bottom: 10px;
    }

    .counter {
        font-size: 60px;
        font-weight: bold;
        margin: 20px 0;
    }

    .buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    button {
        padding: 15px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:active {
        transform: scale(0.95);
    }

    .add {
        background: #00c853;
        color: white;
    }

    .reset {
        background: #ff5252;
        color: white;
    }

    .footer {
        margin-top: 15px;
        font-size: 12px;
        opacity: 0.5;
    }
</style>
</head>

<body>

<div class="app">
    <h1>Заказы сегодня</h1>
    <div class="counter" id="counter">0</div>

    <div class="buttons">
        <button class="add" onclick="addOrder()">➕ Добавить заказ</button>
        <button class="reset" onclick="resetOrders()">♻️ Обнулить</button>
    </div>

    <div class="footer">Работает в реальном времени</div>
</div>

<script>
    let count = localStorage.getItem("orders") || 0;
    document.getElementById("counter").innerText = count;

    function addOrder() {
        count++;
        update();
    }

    function resetOrders() {
        if(confirm("Точно обнулить?")) {
            count = 0;
            update();
        }
    }

    function update() {
        document.getElementById("counter").innerText = count;
        localStorage.setItem("orders", count);
    }

    setInterval(() => {
        let saved = localStorage.getItem("orders");
        if (saved != count) {
            count = saved;
            document.getElementById("counter").innerText = count;
        }
    }, 1000);
</script>

</body>
</html>
