<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Counter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      font-size: 80px;
      margin-bottom: 40px;
    }

    button {
      font-size: 40px;
      margin: 10px;
      padding: 20px 40px;
      border: none;
      border-radius: 15px;
      background: #333;
      color: white;
    }

    button:active {
      background: #555;
    }
  </style>
</head>
<body>

<h1 id="count">0</h1>

<div>
  <button onclick="minus()">-</button>
  <button onclick="plus()">+</button>
</div>

<script>
let count = localStorage.getItem("count");

if (count === null) {
  count = 0;
} else {
  count = parseInt(count);
}

document.getElementById("count").innerText = count;

function plus() {
  count++;
  update();
}

function minus() {
  count--;
  update();
}

function update() {
  document.getElementById("count").innerText = count;
  localStorage.setItem("count", count);
}
</script>

</body>
</html>
