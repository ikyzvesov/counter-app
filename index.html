<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Counter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #e9e9e9;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* Заголовок */
.title {
  font-size: 40px;
  margin-top: 60px;
  color: #555;
}

/* Контейнер */
.display {
  margin: 30px auto;
  padding: 15px;
  background: #9aa0a6;
  border-radius: 20px;
  display: inline-flex;
  gap: 10px;
}

/* Окно цифры */
.digit-box {
  width: 60px;
  height: 80px;
  overflow: hidden;
  background: black;
  border-radius: 10px;
  position: relative;
}

/* Лента цифр */
.digit-strip {
  position: absolute;
  width: 100%;
  transition: transform 0.3s ease-in-out;
}

/* Одна цифра */
.digit {
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  color: white;
}

/* Кнопки */
.buttons {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 40px;
}

.btn {
  width: 100px;
  height: 100px;
  font-size: 50px;
  border: none;
  border-radius: 20px;
}

.minus {
  background: #e6d7c3;
}

.plus {
  background: #7ed37e;
}

.btn:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<div class="title">Заказы</div>

<div class="display" id="display"></div>

<div class="buttons">
  <button class="btn minus" onclick="minus()">−</button>
  <button class="btn plus" onclick="plus()">+</button>
</div>

<script>
let count = localStorage.getItem("count");

if (count === null) {
  count = 0;
} else {
  count = parseInt(count);
}

let strips = [];

function createDigit(initial) {
  let box = document.createElement("div");
  box.className = "digit-box";

  let strip = document.createElement("div");
  strip.className = "digit-strip";

  for (let i = 0; i <= 9; i++) {
    let d = document.createElement("div");
    d.className = "digit";
    d.innerText = i;
    strip.appendChild(d);
  }

  box.appendChild(strip);
  strips.push(strip);

  return box;
}

function setupDisplay() {
  let display = document.getElementById("display");
  display.innerHTML = "";
  strips = [];

  let str = count.toString().padStart(4, '0');

  for (let i = 0; i < str.length; i++) {
    display.appendChild(createDigit(str[i]));
  }

  updateDisplay();
}

function updateDisplay() {
  let str = count.toString().padStart(4, '0');

  for (let i = 0; i < strips.length; i++) {
    let digit = parseInt(str[i]);
    strips[i].style.transform = `translateY(-${digit * 80}px)`;
  }
}

function vibrate() {
  if (navigator.vibrate) {
    navigator.vibrate(30);
  }
}

function update() {
  localStorage.setItem("count", count);
  updateDisplay();
  vibrate();
}

function plus() {
  count++;
  update();
}

function minus() {
  if (count > 0) {
    count--;
    update();
  }
}

setupDisplay();
</script>

</body>
</html>
