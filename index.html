<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders Tracker 3.0</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f1117;
color:#e6edf3;
padding:15px;
}

.app{
max-width:420px;
margin:auto;
}

/* вкладки */

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
flex:1;
border:none;
border-radius:10px;
padding:12px;
font-size:16px;
cursor:pointer;
background:#161b22;
color:white;
}

.tab.active{
background:#238636;
}

/* карточки */

.card{
background:#161b22;
border-radius:14px;
padding:18px;
margin-bottom:15px;
}

/* время */

.time{
font-size:46px;
text-align:center;
color:#7ef9e3;
}

/* счетчик */

.counter{
font-size:80px;
text-align:center;
margin:15px 0;
}

/* кнопки */

.controls{
display:flex;
justify-content:center;
gap:12px;
}

.btn{
border:none;
border-radius:10px;
cursor:pointer;
font-size:24px;
color:white;
}

.square{
width:80px;
height:80px;
}

.plus{
background:#1f8f6d;
}

.minus{
background:#c38b2c;
}

.reset{
display:block;
margin:auto;
margin-top:10px;
width:180px;
height:50px;
background:#9b3a3a;
}

.addMoney{
background:#238636;
height:50px;
width:100%;
}

/* поле */

input{
width:100%;
padding:14px;
border:none;
border-radius:8px;
margin-top:8px;
margin-bottom:8px;
font-size:18px;
background:#0d1117;
color:white;
}

/* статистика */

.stat-row{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:18px;
}

/* история */

.day{
background:#0d1117;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

.day-header{
cursor:pointer;
font-weight:bold;
}

.order{
margin-top:6px;
padding:8px;
background:#161b22;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

.order-buttons{
display:flex;
gap:5px;
}

.small-btn{
border:none;
padding:5px 8px;
border-radius:5px;
cursor:pointer;
color:white;
}

.edit{
background:#1f6feb;
}

.delete{
background:#da3633;
}

.day-total{
margin-top:8px;
font-weight:bold;
color:#7ef9e3;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="app">

<div class="tabs">
<button id="homeBtn" class="tab active" onclick="showTab('home')">🏠 Главная</button>
<button id="historyBtn" class="tab" onclick="showTab('history')">📜 История</button>
</div>

<!-- Главная -->

<div id="homeTab">

<div class="card">

<div class="counter" id="counter">0</div>

<div class="controls">
<button class="btn square plus" onclick="add()">+</button>
<button class="btn square minus" onclick="minus()">−</button>
</div>

<button class="btn reset" onclick="resetCounter()">Сброс</button>

</div>

<div class="card">
<div class="time" id="time">00:00:00.000</div>
</div>

<div class="card">

<b>Сумма заказа (UAH)</b>

<input
type="number"
id="moneyInput"
placeholder="Введите сумму">

<button
class="btn addMoney"
onclick="addOrder()">
Добавить заказ
</button>

</div>

<div class="card">

<b>Сегодня</b>

<div class="stat-row">
<span>Заказы</span>
<span id="todayOrders">0</span>
</div>

<div class="stat-row">
<span>Доход</span>
<span id="todayMoney">0 ₴</span>
</div>

<div class="stat-row">
<span>Средний чек</span>
<span id="avgCheck">0 ₴</span>
</div>

</div>

<div class="card">

<b>Общая статистика</b>

<div class="stat-row">
<span>За неделю</span>
<span id="weekMoney">0 ₴</span>
</div>

<div class="stat-row">
<span>За месяц</span>
<span id="monthMoney">0 ₴</span>
</div>

</div>

</div>

<!-- История -->

<div id="historyTab" class="hidden">

<div class="card">

<b>История заказов</b>

<div id="history"></div>

</div>

</div>

<script>

let count=
Number(localStorage.getItem("count"))||0

let stats=
JSON.parse(localStorage.getItem("stats"))||{}

function today(){
return new Date().toLocaleDateString()
}

function save(){
localStorage.setItem("count",count)
localStorage.setItem("stats",JSON.stringify(stats))
}

function showTab(tab){

document.getElementById("homeTab")
.classList.toggle("hidden",tab!=="home")

document.getElementById("historyTab")
.classList.toggle("hidden",tab!=="history")

document.getElementById("homeBtn")
.classList.toggle("active",tab==="home")

document.getElementById("historyBtn")
.classList.toggle("active",tab==="history")

}
 function add(){
count++
save()
updateUI()
}

function minus(){
if(count>0){
count--
save()
updateUI()
}
}

function resetCounter(){

if(confirm("Сбросить счётчик?")){

count=0

save()

updateUI()

}

}

function addOrder(){

let val=
Number(document.getElementById("moneyInput").value)

if(!val)return

count++

let d=today()

let now=new Date()

let time=
String(now.getHours()).padStart(2,'0')+":"+
String(now.getMinutes()).padStart(2,'0')+":"+
String(now.getSeconds()).padStart(2,'0')

if(!stats[d]){

stats[d]={

orders:0,
money:0,
list:[]

}

}

stats[d].orders++
stats[d].money+=val

stats[d].list.push({

time:time,
money:val

})

document.getElementById("moneyInput").value=""

save()

updateUI()

}

function editOrder(date,index){

let current=
stats[date].list[index].money

let value=
prompt("Новая сумма",current)

if(value===null)return

value=Number(value)

if(!value)return

let old=
stats[date].list[index].money

stats[date].money-=old

stats[date].money+=value

stats[date].list[index].money=value

save()

updateUI()

}

function deleteOrder(date,index){

if(!confirm("Удалить заказ?"))
return

let amount=
stats[date].list[index].money

stats[date].money-=amount

stats[date].orders--

stats[date].list.splice(index,1)

if(stats[date].orders<=0){

delete stats[date]

}

save()

updateUI()

}

function renderHistory(){

let el=
document.getElementById("history")

el.innerHTML=""

Object.keys(stats)
.reverse()
.forEach(date=>{

let s=stats[date]

let day=
document.createElement("div")

day.className="day"

let header=
document.createElement("div")

header.className="day-header"

header.innerHTML=
`📅 ${date} — 📦 ${s.orders} | 💰 ${s.money} ₴`

let content=
document.createElement("div")

content.className="hidden"

if(s.list){

s.list.forEach((order,index)=>{

let row=
document.createElement("div")

row.className="order"

row.innerHTML=`

<div>
🕒 ${order.time}
<br>
💰 ${order.money} ₴
</div>

<div class="order-buttons">

<button
class="small-btn edit"
onclick="editOrder('${date}',${index})">
✏
</button>

<button
class="small-btn delete"
onclick="deleteOrder('${date}',${index})">
🗑
</button>

</div>

`

content.appendChild(row)

})

}

let total=
document.createElement("div")

total.className="day-total"

total.innerHTML=
`Итого за день: ${s.money} ₴`

content.appendChild(total)

header.onclick=()=>{

content.classList.toggle("hidden")

}

day.appendChild(header)

day.appendChild(content)

el.appendChild(day)

})

}

function updateStats(){

let d=today()

let orders=
stats[d]?.orders||0

let money=
stats[d]?.money||0

document.getElementById("todayOrders")
.innerText=orders

document.getElementById("todayMoney")
.innerText=money+" ₴"

let avg=
orders
?Math.round(money/orders)
:0

document.getElementById("avgCheck")
.innerText=avg+" ₴"

let week=0
let month=0

Object.values(stats)
.forEach(s=>{

week+=s.money||0
month+=s.money||0

})

document.getElementById("weekMoney")
.innerText=week+" ₴"

document.getElementById("monthMoney")
.innerText=month+" ₴"

}

function updateUI(){

document.getElementById("counter")
.innerText=count

updateStats()

renderHistory()

}

function updateTime(){

let n=new Date()

let h=
String(n.getHours()).padStart(2,'0')

let m=
String(n.getMinutes()).padStart(2,'0')

let s=
String(n.getSeconds()).padStart(2,'0')

let ms=
String(n.getMilliseconds())
.padStart(3,'0')

document.getElementById("time")
.innerText=
`${h}:${m}:${s}.${ms}`

}

setInterval(updateTime,10)

updateUI()

</script>

</body>
</html>
