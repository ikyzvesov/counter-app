<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders Tracker 2.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0f1117;color:#e6edf3;padding:15px;}
.app{max-width:420px;margin:auto;}
.card{background:#161b22;border-radius:14px;padding:18px;margin-bottom:15px;}
.time{font-size:56px;text-align:center;letter-spacing:2px;color:#7ef9e3;}
.counter{font-size:80px;text-align:center;margin:15px 0;}
.controls{display:flex;justify-content:center;gap:12px;}
.btn{border:none;border-radius:10px;cursor:pointer;font-size:26px;color:white;}
.square{width:80px;height:80px;}
.plus{background:#1f8f6d;}
.minus{background:#c38b2c;}
.reset{display:block;margin:auto;margin-top:10px;width:180px;height:50px;background:#9b3a3a;}
input{width:100%;padding:14px;border:none;border-radius:8px;margin-top:8px;margin-bottom:8px;font-size:18px;background:#0d1117;color:white;}
.addMoney{background:#238636;height:45px;width:100%;}
.stat-row{display:flex;justify-content:space-between;margin-top:8px;font-size:18px;}
.day{background:#0d1117;padding:10px;border-radius:8px;margin-bottom:8px;}
.day-header{cursor:pointer;font-weight:bold;}
.order-item{padding:5px 0 5px 10px;border-bottom:1px solid #222;}
.day-total{padding-top:8px;font-weight:bold;color:#7ef9e3;}
</style>
</head>
<body>
<div class="app">
<div class="card">
<div class="counter" id="counter">0</div>
<div class="controls">
<button class="btn square plus" onclick="add()">+</button>
<button class="btn square minus" onclick="minus()">−</button>
</div>
<button class="btn reset" onclick="reset()">Сброс</button>
</div>

<div class="card">
<div class="time" id="time">00:00:00.000</div>
</div>

<div class="card">
<b>Сумма заказа</b>
<input type="number" id="moneyInput" placeholder="Введите сумму">
<button class="btn addMoney" onclick="addOrder()">Добавить заказ</button>
</div>

<div class="card">
<b>Сегодня</b>
<div class="stat-row"><span>Заказы</span><span id="todayOrders">0</span></div>
<div class="stat-row"><span>Доход</span><span id="todayMoney">0 zł</span></div>
<div class="stat-row"><span>Средний чек</span><span id="avgCheck">0 zł</span></div>
</div>

<div class="card">
<b>История по дням</b>
<div id="history"></div>
</div>
</div>

<script>
let count=Number(localStorage.getItem("count"))||0;
let stats=JSON.parse(localStorage.getItem("stats"))||{};

function today(){
 return new Date().toLocaleDateString();
}

function save(){
 localStorage.setItem("count",count);
 localStorage.setItem("stats",JSON.stringify(stats));
}

function add(){
 count++;
 save();
 updateUI();
}

function minus(){
 if(count>0) count--;
 save();
 updateUI();
}

function reset(){
 if(confirm("Сбросить?")){
   count=0;
   save();
   updateUI();
 }
}

function addOrder(){
 let val=Number(document.getElementById("moneyInput").value);
 if(!val) return;

 count++;

 let d=today();
 let now=new Date();
 let time=now.toLocaleTimeString();

 if(!stats[d]){
   stats[d]={orders:0,money:0,list:[]};
 }

 if(!stats[d].list) stats[d].list=[];

 stats[d].orders++;
 stats[d].money+=val;
 stats[d].list.push({
   time:time,
   money:val
 });

 document.getElementById("moneyInput").value="";
 save();
 updateUI();
}

function updateUI(){
 document.getElementById("counter").innerText=count;

 let d=today();
 let orders=stats[d]?.orders||0;
 let money=stats[d]?.money||0;

 document.getElementById("todayOrders").innerText=orders;
 document.getElementById("todayMoney").innerText=money+" zł";

 let avg=orders?Math.round(money/orders):0;
 document.getElementById("avgCheck").innerText=avg+" zł";

 renderHistory();
}

function renderHistory(){
 let el=document.getElementById("history");
 el.innerHTML="";

 Object.keys(stats).reverse().forEach(date=>{
   let s=stats[date];

   let wrapper=document.createElement("div");
   wrapper.className="day";

   let header=document.createElement("div");
   header.className="day-header";
   header.innerHTML=`📅 ${date} — 📦 ${s.orders} | 💰 ${s.money} zł`;

   let details=document.createElement("div");
   details.style.display="none";

   if(s.list){
     s.list.forEach(order=>{
       let item=document.createElement("div");
       item.className="order-item";
       item.innerHTML=`🕒 ${order.time} — 💰 ${order.money} zł`;
       details.appendChild(item);
     });
   }

   let total=document.createElement("div");
   total.className="day-total";
   total.innerHTML=`Итого за день: ${s.money} zł`;
   details.appendChild(total);

   header.onclick=()=>{
      details.style.display=details.style.display==="none"?"block":"none";
   };

   wrapper.appendChild(header);
   wrapper.appendChild(details);
   el.appendChild(wrapper);
 });
}

function updateTime(){
 let n=new Date();
 let h=String(n.getHours()).padStart(2,'0');
 let m=String(n.getMinutes()).padStart(2,'0');
 let s=String(n.getSeconds()).padStart(2,'0');
 let ms=String(n.getMilliseconds()).padStart(3,'0');

 document.getElementById("time").innerText=`${h}:${m}:${s}.${ms}`;
}

setInterval(updateTime,10);
updateUI();
</script>
</body>
</html>
