<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Counter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .counter {
      font-size: 100px;
      font-weight: 600;
      color: #000;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      gap: 20px;
    }

    button {
      width: 80px;
      height: 80px;
      font-size: 40px;
      border: none;
      border-radius: 20px;
      background: white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    button:active {
      transform: scale(0.95);
    }

    .minus {
      color: red;
    }

    .plus {
      color: green;
    }
  </style>
</head>
<body>

<div class="counter" id="count">0</div>

<div class="buttons">
  <button class="minus" onclick="minus()">−</button>
  <button class="plus" onclick="plus()">+</button>
</div>

<script>
let count = localStorage.getItem("count");

if (count === null) {
  count = 0;
} else {
  count = parseInt(count);
}

updateDisplay();

function plus() {
  count++;
  update();
}

function minus() {
  count--;
  update();
}

function update() {
  localStorage.setItem("count", count);
  updateDisplay();
}

function updateDisplay() {
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
