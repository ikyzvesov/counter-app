<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders Tracker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f1117;
color:#e6edf3;
}

.app{
max-width:420px;
margin:auto;
padding:15px;
}

/* вкладки */

.tabs{
display:flex;
}

.tab{
flex:1;
text-align:center;
padding:12px;
background:#161b22;
cursor:pointer;
}

.tab.active{
background:#1f8f6d;
}

/* экраны */

.screen{
display:none;
}

.screen.active{
display:block;
}

/* карточки */

.card{
background:#161b22;
border-radius:14px;
padding:18px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,255,200,0.05);
}

/* счетчик */

.counter{
font-size:80px;
text-align:center;
margin-bottom:10px;
}

/* кнопки */

.controls{
display:flex;
justify-content:center;
gap:12px;
}

.btn{
border:none;
border-radius:10px;
cursor:pointer;
font-size:26px;
color:white;
}

.square{
width:80px;
height:80px;
}

.plus{
background:#1f8f6d;
}

.minus{
background:#c38b2c;
}

.reset{
display:block;
margin:auto;
margin-top:10px;
width:180px;
height:50px;
background:#9b3a3a;
}

/* время */

.time{
font-size:56px;
text-align:center;
letter-spacing:2px;
color:#7ef9e3;
}

/* ввод */

input{
width:100%;
padding:14px;
border:none;
border-radius:8px;
margin-top:8px;
margin-bottom:8px;
font-size:18px;
background:#0d1117;
color:white;
}

.addMoney{
background:#238636;
height:45px;
width:100%;
}

/* статистика */

.stat-row{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:18px;
}

/* журнал */

.log{
background:#0d1117;
padding:10px;
border-radius:8px;
margin-bottom:6px;
font-size:15px;
}

</style>
</head>

<body>

<div class="tabs">
<div class="tab active" onclick="openTab('main')">Главная</div>
<div class="tab" onclick="openTab('history')">Журнал</div>
</div>

<div class="app">

<!-- главный экран -->

<div id="main" class="screen active">

<div class="card">

<div class="counter" id="counter">0</div>

<div class="controls">
<button class="btn square plus" onclick="add()">+</button>
<button class="btn square minus" onclick="minus()">−</button>
</div>

<button class="btn reset" onclick="reset()">Сброс</button>

</div>

<div class="card">
<div class="time" id="time">00:00:00.000</div>
</div>

<div class="card">

<b>Сумма заказа</b>

<input type="number" id="moneyInput" placeholder="Введите сумму">

<button class="btn addMoney" onclick="addOrder()">Добавить заказ</button>

</div>

<div class="card">

<b>Сегодня</b>

<div class="stat-row">
<span>Заказы</span>
<span id="todayOrders">0</span>
</div>

<div class="stat-row">
<span>Доход</span>
<span id="todayMoney">0 ₴</span>
</div>

<div class="stat-row">
<span>Средний чек</span>
<span id="avgCheck">0 ₴</span>
</div>

</div>

</div>

<!-- журнал -->

<div id="history" class="screen">

<div class="card">

<b>Журнал заказов</b>

<div id="ordersLog"></div>

</div>

</div>

</div>

<script>

let count=Number(localStorage.getItem("count"))||0
let stats=JSON.parse(localStorage.getItem("stats"))||{}
let orders=JSON.parse(localStorage.getItem("orders"))||[]

function today(){
return new Date().toLocaleDateString()
}

function save(){
localStorage.setItem("count",count)
localStorage.setItem("stats",JSON.stringify(stats))
localStorage.setItem("orders",JSON.stringify(orders))
}

/* вкладки */

function openTab(tab){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(tab).classList.add("active")
event.target.classList.add("active")

if(tab==="history") renderLog()

}

/* счетчик */

function add(){
count++
updateStatsOrder()
save()
updateUI()
}

function minus(){
if(count>0)count--
save()
updateUI()
}

function reset(){
if(confirm("Сбросить счетчик?")){
count=0
save()
updateUI()
}
}

/* заказ */

function addOrder(){

let val=Number(document.getElementById("moneyInput").value)

if(!val)return

count++

let now=new Date()

let date=now.toLocaleDateString()
let time=now.toLocaleTimeString()

orders.unshift({
date:date,
time:time,
money:val
})

if(!stats[date])stats[date]={orders:0,money:0}

stats[date].orders++
stats[date].money+=val

document.getElementById("moneyInput").value=""

save()
updateUI()

}

function updateStatsOrder(){

let d=today()

if(!stats[d])stats[d]={orders:0,money:0}

stats[d].orders++

}

/* интерфейс */

function updateUI(){

document.getElementById("counter").innerText=count

let d=today()

let ordersToday=stats[d]?.orders||0
let moneyToday=stats[d]?.money||0

document.getElementById("todayOrders").innerText=ordersToday
document.getElementById("todayMoney").innerText=moneyToday+" ₴"

let avg=ordersToday?Math.round(moneyToday/ordersToday):0
document.getElementById("avgCheck").innerText=avg+" ₴"

}

/* журнал */

function renderLog(){

let el=document.getElementById("ordersLog")
el.innerHTML=""

orders.forEach(o=>{

let div=document.createElement("div")
div.className="log"

div.innerText=`${o.date} ${o.time} — 💰 ${o.money} ₴`

el.appendChild(div)

})

}

/* время */

function updateTime(){

let n=new Date()

let h=String(n.getHours()).padStart(2,'0')
let m=String(n.getMinutes()).padStart(2,'0')
let s=String(n.getSeconds()).padStart(2,'0')
let ms=String(n.getMilliseconds()).padStart(3,'0')

document.getElementById("time").innerText=
`${h}:${m}:${s}.${ms}`

}

setInterval(updateTime,10)

updateUI()

</script>

</body>
</html>
